name: Static Analysis

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  detekt:
    runs-on: ubuntu-26.04
    permissions:
      security-events: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Check for Detekt Issues with type resolution
        run: ./gradlew detektMain detektTest detektFunTest
      - name: Upload SARIF File
        uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        if: always() # Upload even if the previous step failed.
        with:
          sarif_file: build/reports/detekt/merged.sarif
  build-health:
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Check build health
        run: ./gradlew buildHealth checkSortDependencies
